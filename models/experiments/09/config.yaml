# Versioned components
architecture: "02_conv_vae"   # adds Dropout(p=0.20) to encoder conv blocks;
                               # forces distributed representations so CNV profiles
                               # are not memorised as normal (see architectures/02_conv_vae.py)
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"
evaluation:   "03_pf9_evaluation"   # matching exp 08 baseline; includes callability +
                                     # transition percentiles for direct comparison

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/09_vae_dropout"
normalise:  true

# Model — full retraining with 02_conv_vae architecture
latent_dim:    10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10
cnv_downsample_ratio: 0.25   # unchanged from exp 06/07

# HMM segmentation — unchanged from exp 07
hmm_n_states:          6
hmm_self_transition:   0.80
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — unchanged from exp 07
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.30
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

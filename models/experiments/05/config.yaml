# Versioned components
architecture: "01_conv_vae"
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"   # bin-count-gated CRR fallback
evaluation:   "01_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/05_bincount_fallback"
normalise:  true

# Model — reuses experiment 01 checkpoint; no retraining required
latent_dim: 10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10

# HMM segmentation — unchanged from exp 04
hmm_n_states:          6
hmm_self_transition:   0.75
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.30   # unchanged — not tuned to labelled data

# CRR fallback is only applied to genes spanning fewer than this many bins.
# Genes with >= 3 bins are handled by the HMM alone; the fallback exists
# only for ultra-short loci (e.g. GCH1, ~2 bins) where Viterbi is physically
# unable to overcome the self_transition penalty. This threshold generalises
# to genome-wide calling without relying on per-gene labelled ground truth.
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"

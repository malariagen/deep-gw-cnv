# Versioned components
architecture: "01_conv_vae"
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"   # per-gene CRR thresholds
evaluation:   "01_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/05_per_gene_crr"
normalise:  true

# Model — reuses experiment 01 checkpoint; no retraining required
latent_dim: 10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10

# HMM segmentation — unchanged from exp 04
hmm_n_states:          6
hmm_self_transition:   0.75
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling
cnv_min_cn1_proportion: 0.55
cnv_min_confidence:     0.50
cnv_flank_padding:      100000

# Per-gene CRR fallback thresholds (version 03 caller)
# Rationale: exp 04 FP/TP CRR distributions show clean gene-specific gaps.
# CRT:  FP p75=1.58, TP p10=1.64 → raise to 1.60; eliminates ~75% of FPs, FNR stays 0.00
# MDR1: FP p90=1.48, TP p10=1.51 → raise to 1.50; eliminates most FPs, FNR ~unchanged
# GCH1: FP p90=1.40, TP p10=1.37 → overlap; keep at 1.30 to preserve TP recall
# PM2_PM3: FP p90=1.46, TP p10=1.40 → overlap; keep at 1.30
cnv_crr_amp_threshold_crt:     1.60   # was 1.30 globally
cnv_crr_amp_threshold_gch1:    1.30   # unchanged
cnv_crr_amp_threshold_mdr1:    1.50   # was 1.30 globally
cnv_crr_amp_threshold_pm2_pm3: 1.30   # unchanged

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"

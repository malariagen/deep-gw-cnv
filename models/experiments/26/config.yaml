# Versioned components
architecture: "05_conv_vae"   # residual skip connections in encoder
hmm:          "02_gaussian_hmm"
cnv:          "10_genome_cnv_caller"   # band segment filter: CRR band FPs demoted by CN>=2 coverage fraction
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/26_skip_st0.90_sin_curriculum_r0.30_genome_wide_band_segcov0.5"
normalise:  true

# Gene annotation — GFF3 for all protein-coding genes in P. falciparum 3D7.
# Used by 10_genome_cnv_caller to call CNVs genome-wide.
gff_path: "../../../assets/PlasmoDB-54_Pfalciparum3D7.gff"

# Model — reuse exp 21 checkpoint; no retraining.
# Latents, reconstructions, sample_ids, AND segments are symlinked from exp 25 in run.sh.
# HMM does not change; only the CNV caller and evaluation are re-run.
pretrained_checkpoint: "../../../data/results/21_skip_st0.80_sin_curriculum_r0.30/checkpoint.pth"
latent_dim:    10
batch_size:    128
epochs:        100
lr:            1.0e-4
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 0
patience:      20

# Curriculum-weighted sampler — same as exp 21.
cnv_downsample_ratio_initial:  0.05
cnv_downsample_ratio_final:    0.30
cnv_downsample_warmup_epochs:  40

# Sin loss — same as exp 21.
sin_loss_max_weight:    1.0
sin_loss_warmup_epochs: 30

# HMM segmentation — same as exp 25 (self_transition=0.90).
# Segments are symlinked from exp 25; HMM is NOT re-run.
hmm_n_states:          6
hmm_self_transition:   0.90
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — band segment filter; threshold unchanged at 1.20.
# For calls with CRR in [1.20, 1.25), the caller checks what fraction of gene bins
# fall within a CN>=2 HMM segment for that sample.  Genuine amplifications will have
# the HMM backing them (high fraction); CRR-elevation artefacts will not (fraction ≈ 0).
# Threshold of 0.50: at least half the gene must be covered by a CN>=2 HMM segment.
cnv_min_cn1_proportion:         0.55
cnv_min_confidence:             0.50
cnv_flank_padding:              100000
cnv_crr_amp_threshold:          1.20   # unchanged; band filter handles borderline calls
cnv_crr_band_upper:             1.25   # calls with CRR in [1.20, 1.25) require segment support
cnv_crr_band_cn2_threshold:     0.50   # min fraction of gene bins in CN>=2 HMM segment
cnv_crr_gate_threshold:         1.35   # unused by v10; retained for compatibility
cnv_crr_min_bins_fallback:      3
cnv_min_gene_coverage_fraction: 0.50   # unused by v10; retained for compatibility

# Evaluation — applied to the 4 reference genes (GCH1, CRT, MDR1, PM2_PM3),
# using gene_calls.tsv written by 10_genome_cnv_caller.
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

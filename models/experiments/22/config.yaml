# Versioned components
architecture: "05_conv_vae"   # residual skip connections in encoder
hmm:          "02_gaussian_hmm"
cnv:          "05_gene_cnv_caller"   # fractional gene coverage for long genes
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/22_skip_st0.80_sin_curriculum_r0.30_aug_normal"
normalise:  true

# Model — fine-tune from exp 21 checkpoint with synthetic normal augmentation.
# Retraining is required: aug_normal_poisson changes the training distribution.
pretrained_checkpoint: "../../../data/results/21_skip_st0.80_sin_curriculum_r0.30/checkpoint.pth"
latent_dim:    10
batch_size:    128
epochs:        100
lr:            1.0e-4
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 0
patience:      20

# Curriculum-weighted sampler — same as exp 21.
cnv_downsample_ratio_initial:  0.05
cnv_downsample_ratio_final:    0.30
cnv_downsample_warmup_epochs:  40

# Sin loss — same as exp 21.
sin_loss_max_weight:    1.0
sin_loss_warmup_epochs: 30

# Synthetic normal augmentation.
# Each normal sample is Poisson-resampled in __getitem__, giving fresh draws every epoch.
# This tightens the VAE's normal prior: at inference, true CNVs reconstruct less faithfully
# → higher CRR. CNV-positive samples are passed through unchanged.
aug_normal_poisson:      true
aug_normal_depth_scale:  [0.85, 1.15]   # also randomly scale depth per sample per epoch

# HMM segmentation — same params as exp 21.
hmm_n_states:          6
hmm_self_transition:   0.80
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — threshold unchanged from exp 19/21 baseline.
# Signal boosting from training should push FN CRR up; gate stays at 1.30.
cnv_min_cn1_proportion:         0.55
cnv_min_confidence:             0.50
cnv_flank_padding:              100000
cnv_crr_amp_threshold:          1.30   # baseline — boosting signal via training, not gate
cnv_crr_gate_threshold:         1.35   # unchanged; only affects long-gene fractional path
cnv_crr_min_bins_fallback:      3
cnv_min_gene_coverage_fraction: 0.50   # unchanged from exp 19/20/21

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

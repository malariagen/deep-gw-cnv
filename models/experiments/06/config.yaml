# Versioned components
architecture: "01_conv_vae"
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"   # bin-count-gated CRR fallback
evaluation:   "01_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/06_higher_beta_vae"
normalise:  true

# Model — full retrain with CNV-sample downsampling only (ablation-clean).
# Single change from exp 05: cnv_downsample_ratio isolates the training-
# distribution fix without confounding higher-beta or warmup changes.
#
# cnv_downsample_ratio 0.25: CNV-positive samples are sampled at 1/4 the
# rate of normal samples during training via WeightedRandomSampler. PM2
# amplification is present in a large fraction of Pf9; without downsampling,
# the VAE can learn that amplified coverage is the "normal" state.
# Downsampling rebalances the effective training distribution so the model
# treats amplification as the exception, not the baseline.
latent_dim:    10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10
cnv_downsample_ratio: 0.25  # new — CNV-positive samples weighted 4× lower

# HMM segmentation — unchanged from exp 05 to isolate the VAE change
hmm_n_states:          6
hmm_self_transition:   0.75
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.30   # unchanged — not tuned to labelled data

# CRR fallback only for genes < 3 bins (GCH1 ~2 bins); HMM handles the rest.
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"

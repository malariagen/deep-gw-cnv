# Versioned components
architecture: "05_conv_vae"   # residual skip connections in encoder; checkpoint reused from exp 14
hmm:          "02_gaussian_hmm"
cnv:          "04_gene_cnv_caller"   # new: adds CRR gate for long genes
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/17_skip_st0.80_crr_gate"
normalise:  true

# Model — reuse exp 14 checkpoint (architecture unchanged, no retraining required)
latent_dim:    10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10
cnv_downsample_ratio: 0.25   # unchanged — DO NOT increase

# HMM segmentation — unchanged from exp 15/16. Segments copied from exp 16.
hmm_n_states:          6
hmm_self_transition:   0.80
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — 04_gene_cnv_caller adds a CRR gate for long genes.
# Root cause of PPV collapse: cnv_crr_amp_threshold in 03_gene_cnv_caller only applies
# via the fallback path (genes with < crr_min_bins_fallback bins = GCH1 only). CRT,
# MDR1, PM2_PM3 have 4, 7, 7 bins respectively and were never gated. All their FPs come
# from the HMM calling CN>=2 with noise-level CRR (~1.12–1.16).
# New gate in 04_gene_cnv_caller: if HMM calls CN>=2 on a long gene AND CRR <
# cnv_crr_gate_threshold, the call is downgraded to CN=1.
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.30   # restored for GCH1 fallback (exp 16 used 1.40, worsening GCH1 FNR)
cnv_crr_gate_threshold:    1.40   # new: veto long-gene HMM CN>=2 calls with CRR below this
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

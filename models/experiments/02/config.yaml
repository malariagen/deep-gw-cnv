# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/pf9_conv_vae_02"
normalise:  true   # apply log2(count + 1)

# Model
latent_dim: 8

# Training
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5

# Beta annealing (KL weight)
max_beta:      1.0
warmup_epochs: 50

# Early stopping
patience: 8

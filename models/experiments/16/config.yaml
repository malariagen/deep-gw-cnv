# Versioned components
architecture: "05_conv_vae"   # residual skip connections in encoder; checkpoint reused from exp 14
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/16_skip_st0.80_crrthresh1.40"
normalise:  true

# Model — reuse exp 14 checkpoint (architecture unchanged, no retraining required)
latent_dim:    10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10
cnv_downsample_ratio: 0.25   # unchanged — DO NOT increase

# HMM segmentation — unchanged from exp 15. Segments from exp 15 are copied directly;
# re-running HMM would yield identical output since all parameters are unchanged.
hmm_n_states:          6
hmm_self_transition:   0.80   # unchanged from exp 15
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — cnv_crr_amp_threshold raised from 1.30 to 1.40.
# Exp 15 PPV remained collapsed (CRT=0.13, PM2_PM3=0.06) despite tighter HMM prior.
# 05_conv_vae generates more noise-level calls that pass the 1.30 threshold than 04_conv_vae.
# Evaluation CRR shows clear FP vs TP separation across all genes
# (CRT: FP p50=1.12 vs TP p50=1.77; PM2_PM3: FP p50=1.16 vs TP p50=1.51),
# indicating the caller threshold is the right lever to suppress false positives.
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.40   # raised from 1.30 to filter 05_conv_vae noise FPs
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

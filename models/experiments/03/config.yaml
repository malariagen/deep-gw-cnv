# Versioned components — same VAE and HMM algorithm, tuned parameters only
architecture: "01_conv_vae"
hmm:          "01_gaussian_hmm"
cnv:          "01_gene_cnv_caller"
evaluation:   "01_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/03_hmm_threshold_tuned"
normalise:  true

# Model — must match experiment 01 checkpoint; no retraining required
# Only HMM and CNV calling parameters changed, so we reuse the existing VAE.
# run.sh invokes wrap_up.py (inference → HMM → CNV → eval) with the exp 01
# checkpoint, skipping training entirely.
latent_dim: 10

# Training params below are required by wrap_up.py's model init but are NOT
# used in this experiment — the checkpoint is loaded immediately after init.
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10

# HMM segmentation
# Rationale: exp 02 FN p50 still >> 1.0 for all genes (CRT=1.69, GCH1=1.34,
# MDR1=1.57, PM2_PM3=1.51), meaning 0.95 is still too sticky. Zero false
# positives gives full headroom to push stickiness lower.
hmm_n_states:          6
hmm_self_transition:   0.90   # was 0.95 — still too sticky
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling
# Rationale: PM2_PM3 pred_normal CRR p50 = 0.90 in exp 02, meaning chr14
# baseline depression persists. The 0.70 CN=1 sanity check still rejected
# almost all callable samples (FNR=1.00, only 2 TPs). Lowering to 0.55
# accommodates the depressed baseline without opening the door to false
# positives (PPV has been 1.00 in every experiment so far).
cnv_min_cn1_proportion: 0.55   # was 0.70
cnv_min_confidence:     0.50   # was 0.60, relaxed proportionally
cnv_flank_padding:      100000

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"

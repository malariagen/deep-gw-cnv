# Versioned components
architecture: "05_conv_vae"   # residual skip connections in encoder
hmm:          "02_gaussian_hmm"
cnv:          "05_gene_cnv_caller"   # fractional gene coverage for long genes
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/20_skip_st0.80_sin_partialspan_gate1.25"
normalise:  true

# Model — reuse exp 19 fine-tuned checkpoint (no retraining).
# Inference, HMM outputs, and CNV segments are symlinked from exp 19 in run.sh.
pretrained_checkpoint: "../../../data/results/19_skip_st0.80_sin_partialspan/checkpoint.pth"
latent_dim:    10
batch_size:    128
epochs:        100
lr:            1.0e-4
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 0
patience:      20
cnv_downsample_ratio: 0.25   # unchanged — DO NOT increase

# Sin loss — unchanged from exp 18/19 (checkpoint already trained with these).
sin_loss_max_weight:    1.0
sin_loss_warmup_epochs: 30

# HMM segmentation — same params as exp 18/19; segments reused via symlink.
hmm_n_states:          6
hmm_self_transition:   0.80
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — one targeted change from exp 19:
# cnv_crr_amp_threshold: 1.25 (from 1.30) — GCH1 fallback gate.
#   GCH1 has ~2 bins (fallback_eligible), so it's called via CRR threshold only.
#   Exp 19 FNs: CRR p50=1.24, p90=1.29 — all just below 1.30.
#   Lowering to 1.25 should recover FNs with CRR in [1.25, 1.30] (~50% of 139 FNs).
#   pred_normal GCH1 p90=1.14 → very few true-normal samples in [1.25, 1.30].
cnv_min_cn1_proportion:         0.55
cnv_min_confidence:             0.50
cnv_flank_padding:              100000
cnv_crr_amp_threshold:          1.25   # lowered from 1.30 to recover gate-vetoed GCH1 FNs
cnv_crr_gate_threshold:         1.35   # unchanged; only affects long-gene fractional path
cnv_crr_min_bins_fallback:      3
cnv_min_gene_coverage_fraction: 0.50   # unchanged from exp 19

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

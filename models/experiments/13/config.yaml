# Versioned components
architecture: "04_conv_vae"   # unchanged from exp 12 — p=0.30 encoder dropout
hmm:          "02_gaussian_hmm"
cnv:          "03_gene_cnv_caller"
evaluation:   "03_pf9_evaluation"

# Data
store_path: "../../../data/inputs/Pf9-53973-samples-1000bp-core-npy"
out_dir:    "../../../data/results/13_lower_self_transition"
normalise:  true

# Model — reuse exp 12 checkpoint; no retraining required
# Architecture and training params kept identical to exp 12 so the checkpoint is valid.
latent_dim:    10
batch_size:    128
epochs:        300
lr:            1.0e-3
weight_decay:  1.0e-5
max_beta:      1.0
warmup_epochs: 50
patience:      10
cnv_downsample_ratio: 0.25   # unchanged — DO NOT increase

# HMM segmentation — self_transition lowered to push the HMM toward committing
# on weaker-but-real signals.
# Exp 12 FN p50 = 1.38 (PM2_PM3) and 1.23 (GCH1) >> 1.0 confirm real signal is present
# that self_transition=0.80 is discarding. Now that the p=0.30 distribution is established
# we can tune the HMM. 0.65 is a meaningful step (exp 10's 0.80→0.75 had negligible effect
# at p=0.20 — a larger step is warranted to overcome inertia in the p=0.30 distribution).
hmm_n_states:          6
hmm_self_transition:   0.65   # lowered from 0.80 — isolates HMM effect on p=0.30 distribution
hmm_low_cov_threshold: 10
hmm_n_jobs:            -1

# CNV calling — unchanged from exp 12
cnv_min_cn1_proportion:    0.55
cnv_min_confidence:        0.50
cnv_flank_padding:         100000
cnv_crr_amp_threshold:     1.30
cnv_crr_min_bins_fallback: 3

# Evaluation
pf9_gt_path:   "../../../assets/20260313_full_cnv_data_pf9.tsv"
pf9_meta_path: "../../../assets/Pf_9_samples_20260227.txt"
eval_min_group_n: 10

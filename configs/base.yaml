# ============================================================
# base.yaml — shared defaults for all experiments
# Override any field in an experiments/*.yaml file.
# ============================================================

seed: 42

# ------ model -----------------------------------------------
model: null          # set in experiment config, e.g. "baseline_cnn"
model_cfg: {}        # forwarded to the model constructor as a dict

# ------ data ------------------------------------------------
dataset: null        # set in experiment config, e.g. "gw_strain"
data_dir: data/processed/
dataloader:
  batch_size: 32
  num_workers: 4
  pin_memory: true

# ------ training --------------------------------------------
train:
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler:
    name: cosine     # cosine | step | none
    warmup_epochs: 5

# ------ augmentation ----------------------------------------
augmentation:
  enabled: true
  # add per-transform blocks here, e.g.:
  # gaussian_noise:
  #   enabled: true
  #   std: 0.01

# ------ output ----------------------------------------------
output_dir: experiments/   # train.py appends the experiment name
